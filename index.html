<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自訂跑馬燈</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:"Microsoft JhengHei",sans-serif;
    overflow:hidden;
}

/* 控制區 */
.control-box{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
}

input{
    padding:8px;
    font-size:16px;
    border:none;
    border-radius:8px;
}

button{
    padding:8px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ff0000;
    color:#fff;
    cursor:pointer;
}

/* 跑馬燈 */
.marquee-wrap{
    position:absolute;
    top:50%;
    width:100%;
    transform:translateY(-50%);
    overflow:hidden;
    white-space:nowrap;
}

.marquee{
    display:inline-block;
    padding-left:100%;
    font-size:80px;
    font-weight:bold;
    color:red;
    animation:run 12s linear infinite;
}

@keyframes run{
    from{ transform:translateX(0); }
    to{ transform:translateX(-100%); }
}
</style>
</head>

<body>

<div class="control-box">
    <input type="text" id="textInput" placeholder="輸入文字">
    <input type="number" id="speedInput" placeholder="速度(秒)" value="12">
    <input type="number" id="sizeInput" placeholder="字體大小(px)" value="80">
    <button onclick="updateMarquee()">更新</button>
</div>

<div class="marquee-wrap">
    <div class="marquee" id="marqueeText">口袋空空 "發發發!!!</div>
</div>

<script>
function updateMarquee(){
    let text = document.getElementById("textInput").value;
    let speed = document.getElementById("speedInput").value;
    let size = document.getElementById("sizeInput").value;

    let marquee = document.getElementById("marqueeText");

    if(text.trim() !== ""){
        marquee.innerText = text;
    }

    marquee.style.animationDuration = speed + "s";
    marquee.style.fontSize = size + "px";
}
</script>

</body>
</html>
