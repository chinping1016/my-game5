<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字跑馬燈</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:"Microsoft JhengHei",sans-serif;
    overflow:hidden;
}

/* 上方輸入區 */
.control-box{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    gap:10px;
}

input{
    width:400px;
    padding:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#ff3c3c;
    color:#fff;
    cursor:pointer;
}

/* 跑馬燈區 */
.marquee-wrap{
    position:absolute;
    top:50%;
    width:100%;
    transform:translateY(-50%);
    overflow:hidden;
    white-space:nowrap;
}

.marquee{
    display:inline-block;
    font-size:80px;
    font-weight:bold;
    color:#00ffea;
    padding-left:100%;
    animation:run 12s linear infinite;
}

@keyframes run{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}
</style>
</head>

<body>

<div class="control-box">
    <input type="text" id="textInput" placeholder="請輸入跑馬燈文字">
    <button onclick="changeText()">更新文字</button>
</div>

<div class="marquee-wrap">
    <div class="marquee" id="marqueeText">歡迎光臨，全通科技！</div>
</div>

<script>
function changeText(){
    let txt = document.getElementById("textInput").value;
    if(txt.trim() !== ""){
        document.getElementById("marqueeText").innerText = txt;
    }
}
</script>

</body>
</html>
